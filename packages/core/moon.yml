language: 'javascript'

tasks:
  protogen:
    command: 'pnpm run protogen'
    inputs:
    - 'proto/**/*'
    - 'buf.yaml'
    - 'buf.gen.yaml'
    outputs:
    - 'src/gen'
  update-currencies:
    command: 'pnpm run update:currencies'
    inputs:
    - 'scripts/update-currency-codes.mjs'
    - 'package.json'
    outputs:
    - 'src/google/type/currency-codes.ts'
  update-region-codes:
    command: 'pnpm run update:region-codes'
    inputs:
    - 'scripts/update-region-codes.mjs'
    - 'package.json'
    outputs:
    - 'src/google/type/region-codes.ts'
  typecheck:
    command: 'pnpm run typecheck'
    dependsOn:
    - protogen
    - update-currencies
    - update-region-codes
    inputs:
    - '@globs(sources)'
    - 'tsconfig.json'
  test:
    command: 'pnpm run test'
    dependsOn:
    - typecheck
    - check
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
  build:
    command: 'pnpm run build'
    dependsOn:
    - test
    inputs:
    - '@globs(sources)'
    - 'tsdown.config.ts'
    outputs:
    - 'dist'
  pack:
    command: 'pnpm pack'
    dependsOn:
    - build
