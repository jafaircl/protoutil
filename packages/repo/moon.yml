language: 'javascript'

tasks:
  protogen:
    command: 'pnpm run protogen'
    inputs:
    - 'proto/**/*'
    - 'buf.yaml'
    - 'buf.gen.yaml'
    outputs:
    - 'src/gen'
  typecheck:
    command: 'pnpm run typecheck'
    dependsOn:
    - protogen
    inputs:
    - '@globs(sources)'
    - 'tsconfig.json'
  bench:
    command: 'pnpm run bench'
    dependsOn:
    - protogen
    inputs:
    - '@globs(sources)'
    - 'package.json'
    outputs:
    - 'BENCHMARKS.md'
    - 'benchmarks/results.json'
  pack-check:
    command: 'pnpm run pack-check'
    dependsOn:
    - build
    - test
    - core:build
    - aip:build
    - aipql:build
    inputs:
    - '@globs(sources)'
    - 'package.json'
    - 'scripts/pack-check.mjs'
    - 'tsdown.config.ts'
  services-up:
    command: 'docker compose up -d --wait'
    inputs:
    - 'docker-compose.yml'
  services-down:
    command: 'docker compose down'
  test:
    command: 'pnpm run test'
    dependsOn:
    - bench
    - typecheck
    - check
    - services-up
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
  build:
    command: 'pnpm run build'
    dependsOn:
    - test
    - core:build
    - aip:build
    - aipql:build
    inputs:
    - '@globs(sources)'
    - 'tsdown.config.ts'
    outputs:
    - 'dist'
  pack:
    command: 'pnpm pack'
    dependsOn:
    - build
