language: 'javascript'

tasks:
  protogen:
    command: 'pnpm run protogen'
  typecheck:
    command: 'pnpm run typecheck'
    dependsOn:
    - protogen
  test:
    command: 'pnpm run test'
    dependsOn:
    - typecheck
    - check
  build:
    command: 'pnpm run build'
    dependsOn:
    - test
  pack:
    command: 'pnpm pack'
    dependsOn:
    - build
  # dev:
  #   command: 'pnpm run dev'