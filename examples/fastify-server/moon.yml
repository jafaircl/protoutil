language: 'javascript'

tasks:
  protogen:
    command: 'pnpm run protogen'
    inputs:
      - '/examples/proto/**/*'
      - '/examples/buf.yaml'
      - 'buf.gen.yaml'
    outputs:
    - 'src/gen'
  dbgen:
    command: 'pnpm run dbgen'
    dependsOn:
    - protogen
    inputs:
    - 'src/gen/sqlite/schema.sql'
    - 'scripts/*-init-db.ts'
    outputs:
    - 'src/gen'
  dbseed:
    command: 'pnpm run dbseed'
    dependsOn:
    - dbgen
    inputs:
    - 'data/library.db'
    - 'scripts/*-seed-db.ts'
  kyselygen:
    command: 'pnpm run kyselygen'
    dependsOn:
    - dbgen
    inputs:
    - src/gen/sqlite/schema.sql
    outputs:
    - src/gen/kysely/sqlite/types.ts
  sqlcgen:
    command: 'pnpm run sqlcgen'
    dependsOn:
    - protogen
    inputs:
    - 'src/gen/postgres/schema.sql'
    - 'sqlc.yaml'
    outputs:
    - 'src/gen/sqlc/postgres'
  typecheck:
    command: 'pnpm run typecheck'
    dependsOn:
    - kyselygen
    - sqlcgen
    inputs:
    - '@globs(sources)'
    - 'tsconfig.json'
  test:
    command: 'pnpm run test'
    dependsOn:
    - typecheck
    - check
    inputs:
    - '@globs(sources)'
    - '@globs(tests)'
  build:
    command: 'pnpm run build'
    dependsOn:
    - test
    inputs:
    - '@globs(sources)'
    - 'tsdown.config.ts'
    outputs:
    - 'dist'
  dev:
    command: 'pnpm run dev'
    dependsOn:
    - dbseed
    options:
      persistent: true
      cache: false
  pack:
    command: 'pnpm pack'
    dependsOn:
    - build
