<div class="page">
  <div class="page-header">
    <button mat-icon-button (click)="navigateBack()" aria-label="Back to shelves">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>{{ shelf()?.theme ?? 'Loading...' }}</h1>
  </div>

  <div class="mat-elevation-z2 table-card">
    <div class="toolbar">
      <button mat-stroked-button [color]="hasActiveFilter() ? 'primary' : undefined" (click)="openFilterDialog()">
        <mat-icon>filter_list</mat-icon>
        {{ hasActiveFilter() ? 'Edit Filter' : 'Add Filter' }}
      </button>
      <span class="toolbar-spacer"></span>
      <button mat-flat-button color="primary" (click)="openCreateBookDialog()">
        <mat-icon>add</mat-icon>
        Add Book
      </button>
    </div>

    <table
      mat-table
      matSort
      [dataSource]="books()"
      [class.loading]="booksResource.isLoading()"
      (matSortChange)="handleSortChangeEvent($event)"
    >
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>
          <div class="header-cell">
            <span mat-sort-header>Title</span>
            <button mat-icon-button class="column-filter-btn" (click)="openFilterForField('title')" aria-label="Filter by title">
              <mat-icon>filter_list</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let element">{{ element.title }}</td>
      </ng-container>

      <ng-container matColumnDef="author">
        <th mat-header-cell *matHeaderCellDef>
          <div class="header-cell">
            <span mat-sort-header>Author</span>
            <button mat-icon-button class="column-filter-btn" (click)="openFilterForField('author')" aria-label="Filter by author">
              <mat-icon>filter_list</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let element">{{ element.author }}</td>
      </ng-container>

      <ng-container matColumnDef="read">
        <th mat-header-cell *matHeaderCellDef>
          <div class="header-cell">
            <span mat-sort-header>Read</span>
            <button mat-icon-button class="column-filter-btn" (click)="openFilterForField('read')" aria-label="Filter by read status">
              <mat-icon>filter_list</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let element">
          <mat-icon class="read-icon" [class.read]="element.read">{{ element.read ? 'check_circle' : 'cancel' }}</mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="openEditBookDialog(element)" aria-label="Edit book">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="openDeleteBookDialog(element)" aria-label="Delete book">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[5, 10, 20]"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [length]="totalSize()"
      showFirstLastButtons
      (page)="handlePageEvent($event)"
    />
  </div>
</div>
