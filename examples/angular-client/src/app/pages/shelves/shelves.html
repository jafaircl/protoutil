<h1>Shelves</h1>
<div class="mat-elevation-z8">
  <aip-filter-editor [initialTree]="filterTree()" [declarations]="decls()" (treeChange)="onFilterChange($event)"></aip-filter-editor>

  <table
    mat-table
    matSort
    [dataSource]="shelves()"
    [class.loading]="shelvesResource.isLoading()"
    (matSortChange)="handleSortChangeEvent($event)"
  >
    <ng-container matColumnDef="theme">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Theme</th>
      <td mat-cell *matCellDef="let element">{{ element.theme }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    [pageIndex]="pageIndex()"
    [pageSize]="pageSize()"
    [length]="totalSize()"
    showFirstLastButtons
    (page)="handlePageEvent($event)"
  />
</div>
