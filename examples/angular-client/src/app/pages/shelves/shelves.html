<h1>Shelves</h1>
<div class="mat-elevation-z8">
  <mat-form-field appearance="outline">
    <mat-label>Filter Shelves</mat-label>
    <input type="text" matInput [formField]="filterForm" />
    @if (filterForm().invalid() && filterForm().errors().length > 0) {
    <mat-error>{{ filterForm().errors()[0].message }}</mat-error>
    }
  </mat-form-field>

  <table
    mat-table
    matSort
    [dataSource]="shelves()"
    [class.loading]="shelvesResource.isLoading()"
    (matSortChange)="handleSortChangeEvent($event)"
  >
    <ng-container matColumnDef="theme">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Theme</th>
      <td mat-cell *matCellDef="let element">{{ element.theme }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    [pageIndex]="pageIndex()"
    [pageSize]="pageSize()"
    [length]="totalSize()"
    showFirstLastButtons
    (page)="handlePageEvent($event)"
  />
</div>
